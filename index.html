<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will you be my Valentine? ❤️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #ff9ed8, #ff69b4);
      overflow: hidden;
    }
    #noBtn {
      transition: all 0.15s ease-out;
    }
    #noBtn.running {
      position: fixed !important;
      z-index: 50;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white font-sans">
  <div id="main" class="text-center max-w-md mx-auto p-8">
    <h1 class="text-5xl font-bold mb-8 flex items-center justify-center gap-3">
      Will you be my Valentine? <span class="text-4xl">❤️</span>
    </h1>

    <div id="character" class="text-[180px] mb-8 transition-all">🥰</div>

    <div class="flex justify-center gap-6 relative">
      <!-- Yes Button -->
      <button onclick="sayYes()" 
              class="bg-green-500 hover:bg-green-600 px-12 py-6 rounded-3xl text-4xl font-bold shadow-xl transition transform hover:scale-110">
        YES 💖
      </button>

      <!-- No Button -->
      <button onclick="sayNo()" id="noBtn"
              class="bg-red-500 hover:bg-red-600 px-10 py-6 rounded-3xl text-3xl font-bold shadow-xl">
        No
      </button>
    </div>

    <p id="status" class="mt-8 text-xl font-medium text-pink-100 min-h-[3rem]"></p>
  </div>

  <!-- Success Screen -->
  <div id="success" class="hidden text-center max-w-md mx-auto p-8">
    <h2 class="text-5xl font-bold mb-6">Knew you would say yes! 🎉</h2>
    <div class="text-8xl mb-8">🥰💕🐹</div>
    <p class="text-3xl font-medium mb-10">You just made me the happiest person! ❤️</p>
    <button onclick="restart()" class="bg-white text-pink-500 px-10 py-4 rounded-3xl text-2xl font-bold shadow-xl">
      Play again ❤️
    </button>
  </div>

  <canvas id="confetti" class="fixed inset-0 pointer-events-none hidden"></canvas>

  <script>
    let noCount = 0;
    let isRunning = false;

    const noMessages = [
      "No",
      "Are you positive? 😭",
      "Pookie please... ❤️",
      "I will be very sad... 🥺",
      "Really? Not even a little? 🥹",
      "Think of the hamsters! 🐹💔",
      "My heart is breaking... 😢",
      "You're killing me here... 🥀",
      "Last chance!! 😭"
    ];

    const characters = [
      "🥰", "🥺", "😭", "🥹", 
      "😢", "🐹", "💔", "🥀", "😭"
    ];

    const noBtn = document.getElementById("noBtn");

    function getRandomPosition() {
      const padding = 80;
      const maxX = window.innerWidth - noBtn.offsetWidth - padding;
      const maxY = window.innerHeight - noBtn.offsetHeight - padding;
      const x = Math.max(padding, Math.random() * maxX);
      const y = Math.max(padding, Math.random() * maxY);
      return { x, y };
    }

    function moveButtonRandomly() {
      const pos = getRandomPosition();
      noBtn.style.left = `${pos.x}px`;
      noBtn.style.top = `${pos.y}px`;
    }

    function activateRunningMode() {
      if (isRunning) return;
      isRunning = true;

      noBtn.classList.add("running");
      noBtn.style.pointerEvents = "none";
      noBtn.textContent = "Last chance!! 😭";

      noBtn.addEventListener("mouseenter", moveButtonRandomly);
      noBtn.addEventListener("click", (e) => {
        e.preventDefault();
        moveButtonRandomly();
      });
    }

    function sayNo() {
      noCount++;
      const char = document.getElementById("character");
      const status = document.getElementById("status");

      const index = Math.min(noCount - 1, noMessages.length - 1);

      noBtn.textContent = noMessages[index];
      char.textContent = characters[index];
      
      status.textContent = noCount > 6 
        ? "This is getting serious... please say yes 💕" 
        : "Come on... you know you want to say yes 💕";

      if (noCount < 9) {
        // Normal funny stages
        noBtn.classList.add("animate-bounce");
        setTimeout(() => noBtn.classList.remove("animate-bounce"), 600);
      } else {
        // 9th click → running mode
        activateRunningMode();
        moveButtonRandomly();
      }
    }

    function sayYes() {
      document.getElementById("main").classList.add("hidden");
      document.getElementById("success").classList.remove("hidden");
      
      const canvas = document.getElementById("confetti");
      canvas.classList.remove("hidden");
      launchConfetti(canvas);
    }

    function launchConfetti(canvas) {
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let particles = [];
      const colors = ["#ff69b4", "#ff1493", "#ffd700", "#00ff7f", "#ffffff"];

      class Particle {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height - canvas.height;
          this.size = Math.random() * 14 + 8;
          this.speed = Math.random() * 7 + 4;
          this.color = colors[Math.floor(Math.random() * colors.length)];
          this.angle = Math.random() * 360;
          this.spin = Math.random() * 0.3 - 0.15;
        }
        update() { this.y += this.speed; this.angle += this.spin; }
        draw() {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.angle * Math.PI / 180);
          ctx.fillStyle = this.color;
          ctx.font = `${this.size}px sans-serif`;
          ctx.fillText("❤️", 0, 0);
          ctx.restore();
        }
      }

      for (let i = 0; i < 180; i++) particles.push(new Particle());

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = particles.length - 1; i >= 0; i--) {
          particles[i].update();
          particles[i].draw();
          if (particles[i].y > canvas.height + 50) particles.splice(i, 1);
        }
        if (particles.length > 0) requestAnimationFrame(animate);
      }
      animate();
    }

    function restart() {
      location.reload();
    }

    window.addEventListener("resize", () => {
      if (isRunning) moveButtonRandomly();
    });
  </script>
</body>
</html>

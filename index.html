<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will you be my Valentine? ❤️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #ff9ed8, #ff69b4);
    }
    .heart {
      animation: float 3s infinite ease-in-out;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white font-sans">
  <div id="main" class="text-center max-w-md mx-auto p-8">
    <h1 class="text-5xl font-bold mb-8 flex items-center justify-center gap-3">
      Will you be my Valentine? 
      <span class="text-4xl">❤️</span>
    </h1>

    <!-- Cute character -->
    <div id="character" class="text-[180px] mb-8 transition-all">🥰</div>

    <div class="flex justify-center gap-6">
      <!-- Yes button -->
      <button onclick="sayYes()" 
              class="yes-btn bg-green-500 hover:bg-green-600 px-12 py-6 rounded-3xl text-4xl font-bold shadow-xl transition transform hover:scale-110">
        YES 💖
      </button>

      <!-- No button -->
      <button onclick="sayNo()" id="noBtn"
              class="bg-red-500 hover:bg-red-600 px-10 py-6 rounded-3xl text-3xl font-bold shadow-xl transition-all">
        No
      </button>
    </div>

    <p id="status" class="mt-8 text-xl font-medium text-pink-100"></p>
  </div>

  <!-- Success screen (hidden at first) -->
  <div id="success" class="hidden text-center max-w-md mx-auto p-8">
    <h2 class="text-5xl font-bold mb-6">Knew you would say yes! 🎉</h2>
    <div class="text-8xl mb-8">🥰💕🐹</div>
    <p class="text-3xl font-medium mb-10">You just made me the happiest person! ❤️</p>
    
    <button onclick="restart()" 
            class="bg-white text-pink-500 px-10 py-4 rounded-3xl text-2xl font-bold shadow-xl">
      Play again ❤️
    </button>
  </div>

  <canvas id="confetti" class="fixed inset-0 pointer-events-none hidden"></canvas>

  <script>
    let noCount = 0;
    const noMessages = [
      "No",
      "Are you positive? 😭",
      "Pookie please... ❤️",
      "I will be very sad... 🥺",
      "Last chance!! 😢"
    ];
    const characters = ["🥰", "🥺", "😭", "🥹", "😢"];

    function sayNo() {
      noCount++;
      const btn = document.getElementById("noBtn");
      const char = document.getElementById("character");
      const status = document.getElementById("status");

      // Change button text
      btn.textContent = noMessages[noCount % noMessages.length];
      
      // Change character to sadder
      char.textContent = characters[noCount % characters.length];
      
      // Small shake animation
      btn.classList.add("animate-bounce");
      setTimeout(() => btn.classList.remove("animate-bounce"), 500);

      status.textContent = "Come on... you know you want to say yes 💕";
    }

    function sayYes() {
      document.getElementById("main").classList.add("hidden");
      const success = document.getElementById("success");
      success.classList.remove("hidden");
      
      // Confetti
      const canvas = document.getElementById("confetti");
      canvas.classList.remove("hidden");
      launchConfetti(canvas);
    }

    function launchConfetti(canvas) {
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const colors = ["#ff69b4", "#ff1493", "#ffd700", "#00ff7f"];
      let particles = [];

      class Particle {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height - canvas.height;
          this.size = Math.random() * 12 + 6;
          this.speed = Math.random() * 6 + 3;
          this.color = colors[Math.floor(Math.random() * colors.length)];
          this.angle = Math.random() * 360;
        }
        update() {
          this.y += this.speed;
          this.angle += 5;
        }
        draw() {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.angle * Math.PI / 180);
          ctx.fillStyle = this.color;
          ctx.fillText("❤️", 0, 0);
          ctx.restore();
        }
      }

      for (let i = 0; i < 150; i++) particles.push(new Particle());

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
          p.update();
          p.draw();
          if (p.y > canvas.height) particles.splice(i, 1);
        });
        if (particles.length > 0) requestAnimationFrame(animate);
      }
      animate();
    }

    function restart() {
      location.reload();
    }

    // Make canvas full screen
    window.addEventListener("resize", () => {
      const canvas = document.getElementById("confetti");
      if (canvas) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
    });
  </script>
</body>
</html>

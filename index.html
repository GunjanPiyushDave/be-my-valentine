<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Deepu ❤️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&display=swap');
    
    body {
      font-family: 'Playfair Display', serif;
    }
    .title-font {
      font-family: 'Great Vibes', cursive;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-pink-50 to-rose-100 min-h-screen flex items-center justify-center p-6">

  <div class="max-w-4xl w-full">
    <!-- Header -->
    <div class="text-center mb-16">
      <h1 class="title-font text-7xl text-pink-600 mb-3">Deepu ❤️</h1>
      <p class="text-2xl text-pink-700 font-light">Gunjan's Love for You</p>
    </div>

    <div class="grid md:grid-cols-2 gap-8 max-w-3xl mx-auto">
      
      <!-- Card 1: Be My Valentine -->
      <a href="be_my_valentine.html" 
         class="group bg-white rounded-3xl shadow-xl overflow-hidden hover:shadow-2xl transition-all hover:-translate-y-2">
        <div class="h-64 bg-gradient-to-br from-pink-400 to-rose-500 flex items-center justify-center text-8xl">
          💖
        </div>
        <div class="p-8 text-center">
          <h2 class="text-3xl font-medium text-pink-700 mb-3">Be My Valentine</h2>
          <p class="text-pink-600">Will you be my Valentine again?</p>
          <div class="mt-6 inline-block px-8 py-3 bg-pink-600 text-white rounded-full text-lg font-medium group-hover:bg-pink-700 transition-colors">
            Open ❤️
          </div>
        </div>
      </a>

      <!-- Card 2: Why I Choose You -->
      <a href="why_i_choose.html" 
         class="group bg-white rounded-3xl shadow-xl overflow-hidden hover:shadow-2xl transition-all hover:-translate-y-2">
        <div class="h-64 bg-gradient-to-br from-purple-400 to-pink-500 flex items-center justify-center text-8xl">
          🌹
        </div>
        <div class="p-8 text-center">
          <h2 class="text-3xl font-medium text-pink-700 mb-3">Why I Choose You</h2>
          <p class="text-pink-600">Every single day...</p>
          <div class="mt-6 inline-block px-8 py-3 bg-pink-600 text-white rounded-full text-lg font-medium group-hover:bg-pink-700 transition-colors">
            Open 💕
          </div>
        </div>
      </a>

    </div>

    <p class="text-center text-pink-500 mt-12 text-sm">
      Made with love by Gunjan for Deepu ❤️
    </p>
  </div>

</body>
</html>
